<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Yellow Royal Diary - 3D Palace Edition</title>
    <style>
        /* === IMPORT FONTS === */
        /* Cinzel untuk aura kerajaan, Dancing Script untuk tulisan tangan */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Dancing+Script:wght@500;700&family=Lora:ital@1&display=swap');

        :root {
            --royal-red: #5b0f18;
            --royal-gold: #d4af37;
            --gold-light: #f3e5ab;
            --parchment: #fdf5e6;
            --text-ink: #2b1d0e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* Dinding Istana dengan efek wallpaper damask / mewah */
            background-color: var(--royal-red);
            background-image: 
                radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%),
                repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,0,0,0.1) 20px, rgba(0,0,0,0.1) 40px);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Penting untuk efek 3D */
        }

        h1, h2, h3 { text-shadow: 2px 2px 4px rgba(0,0,0,0.7); text-align: center; }

        /* === BINGKAI KELUARGA KERAJAAN (BACKGROUND) === */
        .royal-portrait {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 100px;
            background: linear-gradient(135deg, #2a0800, #5b0f18);
            border: 5px solid var(--royal-gold);
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            z-index: 0;
            opacity: 0.7;
        }

        /* === PELAYAN ISTANA (BUTLER NARRATOR) === */
        #butler-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--royal-gold);
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Lora', serif;
            font-style: italic;
            color: var(--gold-light);
            z-index: 100;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: all 0.5s ease;
        }
        .butler-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--royal-gold); font-style: normal; display: block; margin-bottom: 5px; }

        /* === SPA SCREENS === */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateZ(-200px) rotateY(20deg); /* 3D effect saat inaktif */
            z-index: 10;
        }
        .screen.active {
            opacity: 1; pointer-events: auto;
            transform: translateZ(0) rotateY(0deg);
        }

        /* === BUTTONS 3D === */
        .btn-3d {
            background: linear-gradient(to bottom, #f9d976 0%, #e9b646 100%);
            color: var(--royal-red);
            border: 2px solid #8a6327;
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 6px 0 #8a6327, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
            text-transform: uppercase;
            margin-top: 20px;
        }
        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #8a6327, 0 2px 5px rgba(0,0,0,0.5);
        }

        /* === SCREEN 1: LANDING === */
        #screen-landing h1 { font-size: 48px; color: var(--royal-gold); margin-bottom: 10px; }
        .input-3d {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--royal-gold);
            color: var(--gold-light);
            padding: 15px; font-size: 20px; font-family: 'Cinzel', serif;
            text-align: center; border-radius: 5px; width: 300px; outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .input-3d::placeholder { color: rgba(243, 229, 171, 0.5); }

        /* === SCREEN 2: MOOD CHECK === */
        .mood-container { display: flex; gap: 30px; margin-top: 40px; }
        .mood-btn {
            font-size: 60px; background: none; border: none; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }
        .mood-btn:hover { transform: scale(1.3) translateZ(50px); }

        /* === SCREEN 3: 3D JOURNALING === */
        .scroll-wrapper {
            position: relative;
            width: 90%; max-width: 700px; height: 60vh;
            perspective: 1200px;
        }
        /* Kertas 3D */
        .paper-3d {
            width: 100%; height: 100%;
            background: linear-gradient(to right, #e6c27a 0%, var(--parchment) 5%, var(--parchment) 95%, #e6c27a 100%);
            border-left: 10px solid #b8860b; border-right: 10px solid #b8860b; /* Gulungan kayu */
            border-radius: 3px;
            padding: 40px 50px;
            box-shadow: 
                0 30px 50px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(139, 69, 19, 0.3);
            /* Animasi membuka gulungan */
            transform-origin: center;
            animation: unroll 1.5s ease-out forwards;
        }

        @keyframes unroll {
            0% { transform: rotateX(60deg) scaleY(0); opacity: 0; }
            50% { transform: rotateX(-10deg) scaleY(1.1); opacity: 1; }
            100% { transform: rotateX(0deg) scaleY(1); opacity: 1; }
        }

        /* Tulisan Tangan */
        .lettering-input {
            width: 100%; height: 100%;
            background: transparent; border: none; outline: none; resize: none;
            font-family: 'Dancing Script', cursive; /* Tulisan Tangan Mewah */
            font-size: 32px;
            line-height: 1.6;
            color: var(--text-ink);
            text-shadow: 0px 0px 1px rgba(0,0,0,0.2); /* Efek tinta basah */
        }

        /* === SCREEN 4: GAME (BANISH GLOOM) === */
        #game-area {
            width: 80%; max-width: 600px; height: 50vh;
            background: rgba(0,0,0,0.5);
            border: 4px solid var(--royal-gold);
            border-radius: 10px; position: relative; overflow: hidden;
            cursor: crosshair;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
        }
        .gloom-monster {
            position: absolute; font-size: 40px; cursor: pointer;
            transition: transform 0.2s;
            animation: float 2s infinite alternate;
        }
        @keyframes float { from { transform: translateY(0px); } to { transform: translateY(-20px); } }
        #score-board { font-size: 24px; color: var(--gold-light); margin-bottom: 20px; }

    </style>
</head>
<body>

    <div class="royal-portrait">
        👨‍👑👩‍👑
    </div>

    <div id="butler-box">
        <span class="butler-name">Lord Chamberlain</span>
        <span id="butler-text">Selamat datang di Istana, Yang Mulia.</span>
    </div>

    <div id="screen-landing" class="screen active">
        <h1>The Royal Diary</h1>
        <h3 style="margin-bottom: 30px; font-weight: normal; font-family: 'Lora';">Bilik Rahasia Tinta Emas</h3>
        <input type="text" id="input-name" class="input-3d" placeholder="Gelar & Nama Anda..." autocomplete="off">
        <button class="btn-3d" onclick="enterPalace()">Buka Gerbang Istana</button>
    </div>

    <div id="screen-mood" class="screen">
        <h2>Bagaimana cuaca hati Anda hari ini, Yang Mulia?</h2>
        <div class="mood-container">
            <button class="mood-btn" onclick="selectMood('👑 Senang', 'positif')">👑</button>
            <button class="mood-btn" onclick="selectMood('🌤️ Tenang', 'netral')">🌤️</button>
            <button class="mood-btn" onclick="selectMood('🌧️ Sedih', 'negatif')">🌧️</button>
            <button class="mood-btn" onclick="selectMood('🌪️ Marah', 'negatif')">🌪️</button>
        </div>
        <div id="action-buttons" style="display: none; margin-top: 40px; gap: 20px;">
            <button class="btn-3d" id="btn-write" onclick="openScroll()">Tulis Titah</button>
            <button class="btn-3d" id="btn-game" style="display: none; background: linear-gradient(to bottom, #ff7e5f, #feb47b);" onclick="startGame()">Main Panahan Stres</button>
        </div>
    </div>

    <div id="screen-journal" class="screen">
        <div class="scroll-wrapper">
            <div class="paper-3d">
                <textarea id="journal-text" class="lettering-input" placeholder="Tinta emas telah disiapkan. Goreskan isi hati Anda di sini..."></textarea>
            </div>
        </div>
        <button class="btn-3d" onclick="sealJournal()">Segel Gulungan Ini</button>
    </div>

    <div id="screen-game" class="screen">
        <h2>Latihan Pedang: Usir Kesedihan!</h2>
        <div id="score-board">Skor Monster: <span id="game-score">0</span> / 10</div>
        <div id="game-area"></div>
        <button class="btn-3d" onclick="endGame()">Sudah Merasa Lebih Baik, Kembali Menulis</button>
    </div>

    <script>
        let userName = "";
        let currentMood = "";
        let butlerText = document.getElementById('butler-text');
        
        // --- SISTEM PELAYAN (BUTLER) ---
        function butlerSpeak(text) {
            butlerText.style.opacity = 0;
            setTimeout(() => {
                butlerText.innerText = `"${text}"`;
                butlerText.style.opacity = 1;
            }, 300);
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- ALUR HALAMAN ---
        function enterPalace() {
            const input = document.getElementById('input-name').value.trim();
            if(!input) {
                butlerSpeak("Mohon ampun, tapi saya harus tahu siapa nama Yang Mulia sebelum membuka gerbang.");
                return;
            }
            userName = input;
            butlerSpeak(`Selamat datang kembali di singgasana, Yang Mulia ${userName}.`);
            switchScreen('screen-mood');
        }

        function selectMood(mood, type) {
            currentMood = mood;
            let actionDiv = document.getElementById('action-buttons');
            let btnGame = document.getElementById('btn-game');
            actionDiv.style.display = "flex";

            if(type === 'positif' || type === 'netral') {
                butlerSpeak("Kabar yang sangat menyejukkan hati. Kertas gulungan sudah hamba siapkan.");
                btnGame.style.display = "none";
            } else {
                butlerSpeak("Tampaknya awan gelap sedang menyelimuti Anda. Ingin menulis langsung, atau ingin hamba siapkan Arena Latihan untuk melampiaskan stres?");
                btnGame.style.display = "block"; // Tampilkan tombol game
            }
        }

        function openScroll() {
            switchScreen('screen-journal');
            butlerSpeak("Menulislah dengan bebas, Yang Mulia. Tidak ada yang akan menghakimi di bilik ini.");
        }

        function sealJournal() {
            let text = document.getElementById('journal-text').value.trim();
            if(!text) {
                butlerSpeak("Gulungan masih bersih tanpa goresan tinta, Yang Mulia.");
                return;
            }
            // Di sini kamu bisa tambahkan logika simpan ke LocalStorage seperti kode sebelumnya
            butlerSpeak("Titah Anda telah disimpan dengan aman di Arsip Kerajaan. Istirahatlah yang tenang, Yang Mulia.");
            document.getElementById('journal-text').value = '';
            
            // Kembali ke layar awal setelah 4 detik
            setTimeout(() => {
                switchScreen('screen-landing');
                butlerSpeak("Sampai jumpa lagi. Pintu Istana selalu terbuka untuk Anda.");
                document.getElementById('action-buttons').style.display = 'none';
            }, 4000);
        }

        // --- MINI GAME: USIR KESEDIHAN ---
        let gameInterval;
        let score = 0;

        function startGame() {
            switchScreen('screen-game');
            butlerSpeak("Basmi monster stres itu dengan sentuhan jari Anda, Yang Mulia!");
            score = 0;
            document.getElementById('game-score').innerText = score;
            document.getElementById('game-area').innerHTML = ''; // Bersihkan arena
            
            gameInterval = setInterval(spawnMonster, 800);
        }

        function spawnMonster() {
            const area = document.getElementById('game-area');
            const monster = document.createElement('div');
            monster.className = 'gloom-monster';
            
            // Random Emoji Monster
            const emojis = ['🦇', '🕷️', '🌩️', '👹'];
            monster.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Posisi acak
            let maxX = area.clientWidth - 50;
            let maxY = area.clientHeight - 50;
            monster.style.left = Math.floor(Math.random() * maxX) + 'px';
            monster.style.top = Math.floor(Math.random() * maxY) + 'px';
            
            // Event ketika diklik
            monster.onclick = function() {
                this.innerText = '✨'; // Berubah jadi bintang
                this.style.transform = 'scale(1.5)';
                this.style.opacity = '0'; // Menghilang
                score++;
                document.getElementById('game-score').innerText = score;
                
                setTimeout(() => this.remove(), 300);

                if(score >= 10) {
                    endGame();
                    butlerSpeak("Luar biasa! Hamba yakin pikiran Anda sudah jauh lebih jernih sekarang. Mari kita kembali menulis.");
                }
            };
            
            area.appendChild(monster);
            
            // Monster hilang sendiri setelah 2 detik kalau tidak diklik
            setTimeout(() => {
                if(monster.parentNode) monster.remove();
            }, 2000);
        }

        function endGame() {
            clearInterval(gameInterval);
            document.getElementById('game-area').innerHTML = '';
            openScroll(); // Langsung pindah ke jurnal
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Yellow Royal Diary</title>
    <style>
        /* === COLOR PALETTE & FONTS === */
        :root {
            --bg-yellow: #FFF9C4; /* Pastel Yellow */
            --sky-blue: #87CEEB; /* Latar halaman 1 */
            --cream: #FFFDD0; /* Kertas/Perkamen */
            --gold: #FFD700; /* Aksen pinggiran */
            --maroon: #800000; /* Teks & Lilin */
            --text-color: #4A3000; /* Cokelat gelap untuk teks bacaan */
        }

        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-yellow);
            color: var(--text-color);
            overflow: hidden; /* Mencegah scroll saat transisi */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1, h2, h3 {
            font-family: 'Lora', serif;
            color: var(--maroon);
            text-align: center;
            margin-bottom: 20px;
        }

        /* === SPA SCREEN TRANSITIONS === */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease;
            transform: translateY(20px);
            padding: 20px;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            z-index: 10;
        }

        /* === BUTTONS === */
        .btn-royal {
            background-color: var(--gold);
            color: var(--maroon);
            border: 2px solid var(--maroon);
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--maroon);
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn-royal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--maroon);
        }

        .btn-royal:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--maroon);
        }

        /* === SCREEN 1: LANDING PAGE === */
        #screen-landing {
            background: linear-gradient(to bottom, var(--sky-blue) 0%, #E0F7FA 100%);
        }
        
        .castle-emoji {
            font-size: 80px;
            margin-bottom: -20px;
            z-index: 1;
        }

        .parchment {
            background-color: var(--cream);
            border: 4px solid var(--gold);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
        }

        .parchment::before, .parchment::after {
            content: '📜';
            position: absolute;
            font-size: 30px;
            top: -15px;
        }
        .parchment::before { left: -15px; }
        .parchment::after { right: -15px; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--gold);
            border-radius: 8px;
            background: transparent;
            font-family: 'Lora', serif;
            font-size: 18px;
            text-align: center;
            color: var(--maroon);
            outline: none;
        }

        /* === SCREEN 2: WELCOME === */
        .gate-container {
            font-size: 100px;
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .gate {
            transition: transform 2s ease-in-out;
        }

        .gate.open-left { transform: translateX(-150px) rotateY(60deg); opacity: 0; }
        .gate.open-right { transform: translateX(150px) rotateY(-60deg); opacity: 0; }

        .welcome-text {
            font-size: 32px;
            opacity: 0;
            transition: opacity 1s ease 0.5s; /* Delay muncul */
        }
        .welcome-text.show { opacity: 1; }

        /* === SCREEN 3: MOOD CHECK === */
        .mood-container {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .mood-btn {
            font-size: 50px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: grayscale(0.2);
        }

        .mood-btn:hover {
            transform: scale(1.3);
            filter: grayscale(0);
        }

        .mood-btn.selected {
            transform: scale(1.4);
            filter: grayscale(0);
            text-shadow: 0 0 20px var(--gold);
        }

        #support-text {
            font-family: 'Lora', serif;
            font-size: 20px;
            font-style: italic;
            color: var(--maroon);
            min-height: 60px;
            text-align: center;
            max-width: 500px;
            transition: opacity 0.3s;
        }

        /* === SCREEN 4: JOURNALING === */
        .letter-paper {
            width: 90%;
            max-width: 600px;
            height: 50vh;
            background-color: var(--cream);
            border: 2px solid var(--gold);
            border-radius: 5px;
            padding: 30px;
            font-family: 'Lora', serif;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-color);
            resize: none;
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.2), 0 5px 15px rgba(0,0,0,0.05);
            background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(200, 150, 0, 0.1) 31px, rgba(200, 150, 0, 0.1) 32px);
            outline: none;
        }

        /* === SCREEN 5: SEALING ANIMATION === */
        .envelope-wrapper {
            position: relative;
            font-size: 150px;
            line-height: 1;
            margin-bottom: 30px;
        }

        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #A52A2A, var(--maroon));
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.3);
            transform: translate(-50%, -50%) scale(5);
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: var(--gold);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wax-seal::after { content: '👑'; }

        .wax-seal.stamped {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .sealing-buttons {
            display: flex;
            gap: 20px;
            opacity: 0;
            transition: opacity 1s ease 1s; /* Delay until seal is stamped */
        }
        .sealing-buttons.show { opacity: 1; }

        /* === SCREEN 6: ARCHIVE === */
        #screen-archive {
            justify-content: flex-start;
            padding-top: 50px;
            overflow-y: auto; /* Bisa scroll jika arsip banyak */
        }

        .bookshelf {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            background-color: rgba(255, 253, 208, 0.5); /* Cream transparant */
            border-bottom: 10px solid #8B4513; /* Kayu rak */
            border-radius: 10px 10px 0 0;
        }

        .archive-card {
            background: linear-gradient(135deg, var(--cream), #FFF9E6);
            border: 2px solid var(--gold);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.2s;
        }

        .archive-card:hover {
            transform: translateY(-5px);
            background: var(--gold);
        }

        .archive-date { font-size: 12px; font-weight: 600; color: var(--maroon); margin-bottom: 5px; }
        .archive-mood { font-size: 30px; }

        /* Modal Arsip */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--cream);
            border: 4px solid var(--gold);
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: var(--maroon);
        }
        
        .modal-body {
            font-family: 'Lora', serif;
            line-height: 1.6;
            margin-top: 20px;
            white-space: pre-wrap;
        }

    </style>
</head>
<body>

    <div id="screen-landing" class="screen active">
        <div class="castle-emoji">🏰</div>
        <div class="parchment">
            <h1>The Yellow Royal Diary</h1>
            <p style="margin-bottom: 15px;">Boleh kami tahu nama Yang Mulia?</p>
            <input type="text" id="input-name" placeholder="Ketik namamu..." autocomplete="off">
            <button class="btn-royal" onclick="enterCastle()">Masuk ke Istana</button>
        </div>
    </div>

    <div id="screen-welcome" class="screen">
        <div class="gate-container">
            <div id="gate-left" class="gate">🚪</div>
            <div id="gate-right" class="gate">🚪</div>
        </div>
        <h2 id="welcome-msg" class="welcome-text">Welcome home, Yang Mulia!</h2>
    </div>

    <div id="screen-mood" class="screen">
        <h2>Bagaimana suasana hati Yang Mulia hari ini?</h2>
        <div class="mood-container">
            <button class="mood-btn" onclick="selectMood('👑 Senang', this, 'Luar biasa, Yang Mulia! Semoga kebahagiaan ini menular ke seluruh kerajaan.')">👑</button>
            <button class="mood-btn" onclick="selectMood('🌤️ Biasa', this, 'Hari yang tenang adalah berkah tersendiri. Kami siap menemani hari Yang Mulia.')">🌤️</button>
            <button class="mood-btn" onclick="selectMood('🌧️ Sedih', this, 'Jangan takut, Yang Mulia. Di sini aman. Biarkan kami menjaga perasaanmu.')">🌧️</button>
            <button class="mood-btn" onclick="selectMood('🌪️ Marah', this, 'Keluarkan semua keluh kesah itu, Yang Mulia. Kertas ini menampung segalanya tanpa menghakimi.')">🌪️</button>
        </div>
        <p id="support-text"></p>
        <button id="btn-lanjut" class="btn-royal" style="display: none; opacity: 0; transition: opacity 0.5s;" onclick="goToJournal()">Lanjut Menulis</button>
    </div>

    <div id="screen-journal" class="screen">
        <h2>Ceritakan cerita kamu hari ini...</h2>
        <textarea id="journal-text" class="letter-paper" placeholder="Tuliskan titah atau ceritamu di sini, Yang Mulia..."></textarea>
        <button class="btn-royal" onclick="sealJournal()">Done</button>
    </div>

    <div id="screen-sealing" class="screen">
        <div class="envelope-wrapper">
            ✉️
            <div id="wax-seal" class="wax-seal"></div>
        </div>
        <h2>Surat Telah Disegel!</h2>
        <div id="sealing-options" class="sealing-buttons">
            <button class="btn-royal" onclick="writeAgain()">Ada titah lain?</button>
            <button class="btn-royal" onclick="goToArchive()">Pergi ke Ruang Arsip</button>
        </div>
    </div>

    <div id="screen-archive" class="screen">
        <h2>Ruang Arsip Kerajaan</h2>
        <div class="bookshelf" id="bookshelf">
            </div>
        <button class="btn-royal" style="margin-top: 40px;" onclick="writeAgain()">Tulis Jurnal Baru</button>
    </div>

    <div id="archive-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✖</span>
            <h3 id="modal-title">Tanggal</h3>
            <div id="modal-body" class="modal-body">Isi cerita...</div>
        </div>
    </div>

    <script>
        // State Variables
        let userName = "";
        let currentMood = "";
        let journalData = [];

        // Inisialisasi: Ambil data dari LocalStorage jika ada
        window.onload = () => {
            const savedData = localStorage.getItem('royalDiaryEntries');
            if(savedData) journalData = JSON.parse(savedData);
            
            const savedName = localStorage.getItem('royalDiaryName');
            if(savedName) document.getElementById('input-name').value = savedName;
        };

        // Fungsi Transisi Antar Layar
        function switchScreen(targetId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');
        }

        // 1. Landing -> Welcome
        function enterCastle() {
            const input = document.getElementById('input-name').value.trim();
            if (!input) {
                alert("Mohon isi nama Yang Mulia terlebih dahulu.");
                return;
            }
            userName = input;
            localStorage.setItem('royalDiaryName', userName);
            
            document.getElementById('welcome-msg').innerText = `Welcome home, Yang Mulia ${userName}!`;
            switchScreen('screen-welcome');

            // Animasi Welcome Screen
            setTimeout(() => {
                document.getElementById('gate-left').classList.add('open-left');
                document.getElementById('gate-right').classList.add('open-right');
                document.getElementById('welcome-msg').classList.add('show');
            }, 500);

            // Otomatis pindah ke Mood Check setelah jeda
            setTimeout(() => {
                switchScreen('screen-mood');
            }, 3500);
        }

        // 3. Mood Check Logic
        function selectMood(moodName, btnElement, supportMessage) {
            currentMood = moodName;
            
            // Hapus efek terpilih dari tombol lain
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');

            // Tampilkan pesan supportif
            const supportEl = document.getElementById('support-text');
            supportEl.style.opacity = 0;
            setTimeout(() => {
                supportEl.innerText = `"${supportMessage}"`;
                supportEl.style.opacity = 1;
            }, 300);

            // Tampilkan tombol lanjut
            const btnLanjut = document.getElementById('btn-lanjut');
            btnLanjut.style.display = "block";
            setTimeout(() => btnLanjut.style.opacity = 1, 100);
        }

        // 3 -> 4. Ke Area Menulis
        function goToJournal() {
            switchScreen('screen-journal');
        }

        // 4 -> 5. Menyimpan Jurnal & Segel
        function sealJournal() {
            const text = document.getElementById('journal-text').value.trim();
            if (!text) {
                alert("Kertasnya masih kosong, Yang Mulia. Mohon tuliskan sesuatu.");
                return;
            }

            // Simpan Data
            const dateStr = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            const newEntry = {
                id: Date.now(),
                date: dateStr,
                mood: currentMood,
                content: text
            };

            journalData.push(newEntry);
            localStorage.setItem('royalDiaryEntries', JSON.stringify(journalData));

            // Bersihkan textarea untuk sesi berikutnya
            document.getElementById('journal-text').value = '';

            // Pindah ke layar segel & jalankan animasi
            switchScreen('screen-sealing');
            
            // Reset state animasi
            const seal = document.getElementById('wax-seal');
            const buttons = document.getElementById('sealing-options');
            seal.classList.remove('stamped');
            buttons.classList.remove('show');

            // Trigger animasi cap lilin
            setTimeout(() => {
                seal.classList.add('stamped');
            }, 500);

            // Munculkan tombol opsi setelah disegel
            setTimeout(() => {
                buttons.classList.add('show');
            }, 1200);
        }

        // 5. Opsi: Tulis lagi
        function writeAgain() {
            // Reset mood selection
            currentMood = "";
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('support-text').innerText = "";
            const btnLanjut = document.getElementById('btn-lanjut');
            btnLanjut.style.opacity = 0;
            setTimeout(() => btnLanjut.style.display = "none", 500);

            switchScreen('screen-mood');
        }

        // 5 -> 6. Opsi: Ke Arsip
        function goToArchive() {
            renderArchive();
            switchScreen('screen-archive');
        }

        // 6. Render Data Arsip ke Rak Buku
        function renderArchive() {
            const bookshelf = document.getElementById('bookshelf');
            bookshelf.innerHTML = ''; // Kosongkan dulu

            if(journalData.length === 0) {
                bookshelf.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--maroon);'>Belum ada arsip kerajaan yang tercatat.</p>";
                return;
            }

            // Tampilkan dari yang terbaru (reverse)
            const reversedData = [...journalData].reverse();

            reversedData.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'archive-card';
                
                // Ambil emoji saja dari string mood (misal: "👑 Senang" -> "👑")
                const emojiOnly = entry.mood.split(' ')[0];

                card.innerHTML = `
                    <div class="archive-date">${entry.date.split(',')[1] || entry.date}</div>
                    <div class="archive-mood">${emojiOnly}</div>
                `;

                // Event saat kartu diklik buka modal
                card.onclick = () => openModal(entry);
                bookshelf.appendChild(card);
            });
        }

        // Modal Logic
        function openModal(entry) {
            document.getElementById('modal-title').innerText = `${entry.date} - ${entry.mood}`;
            document.getElementById('modal-body').innerText = entry.content;
            document.getElementById('archive-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('archive-modal').classList.remove('active');
        }

    </script>
</body>
</html>
